[[MQTT]]

    Type = EmonHubMqttInterfacer
    [[[init_settings]]]
        mqtt_host = 127.0.0.1
        mqtt_port = 1883
        mqtt_user = emonpi
        mqtt_passwd = emonpimqtt2016
        # TLS/SSL settings (MQTTS) - optional
        # Set mqtt_tls_enabled = true to enable MQTT over TLS (MQTTS)
        # Typical MQTTS port is 8883
        # mqtt_tls_enabled = false
        # Path to CA certificate file for server verification (leave blank to use system CAs)
        # mqtt_tls_ca_certs =
        # Path to client certificate file (required for mutual TLS authentication)
        # mqtt_tls_certfile =
        # Path to client private key file (required for mutual TLS authentication)
        # mqtt_tls_keyfile =
        # Set mqtt_tls_insecure = true to disable server hostname verification (not recommended)
        # mqtt_tls_insecure = false

    [[[runtimesettings]]]
        # pubchannels = ToRFM12,
        subchannels = ToEmonCMS,

        # emonhub/rx/10/values format
        # Use with emoncms Nodes module
        node_format_enable = 0
        node_format_basetopic = emonhub/

        # emon/emontx/power1 format - use with Emoncms MQTT input
        # http://github.com/emoncms/emoncms/blob/master/docs/RaspberryPi/MQTT.md
        nodevar_format_enable = 1
        nodevar_format_basetopic = emon/

        # Single JSON payload published  - use with Emoncms MQTT
        node_JSON_enable = 0
        node_JSON_basetopic = emon/
